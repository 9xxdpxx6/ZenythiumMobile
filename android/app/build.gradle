import java.util.Properties

apply plugin: 'com.android.application'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")
def hasReleaseKeystore = keystorePropertiesFile.exists()
def requiredReleaseKeystoreKeys = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword']

if (hasReleaseKeystore) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(stream)
    }
}

def missingReleaseKeystoreKeys = requiredReleaseKeystoreKeys.findAll { key ->
    !keystoreProperties.containsKey(key) || !keystoreProperties[key]?.toString()?.trim()
}

def releaseKeystoreFile = null
if (hasReleaseKeystore && missingReleaseKeystoreKeys.isEmpty()) {
    releaseKeystoreFile = rootProject.file(keystoreProperties['storeFile'])
}

def isReleaseBuildRequested = gradle.startParameter.taskNames.any { taskName ->
    taskName.toLowerCase().contains('release')
}

if (isReleaseBuildRequested) {
    if (!hasReleaseKeystore) {
        throw new GradleException("android/keystore.properties not found. Release builds require a dedicated keystore configuration.")
    }
    if (!missingReleaseKeystoreKeys.isEmpty()) {
        throw new GradleException("android/keystore.properties is missing required keys: ${missingReleaseKeystoreKeys.join(', ')}")
    }
    if (!releaseKeystoreFile.exists()) {
        throw new GradleException("Release keystore file not found: ${releaseKeystoreFile}")
    }
}

android {
    namespace "com.zenythium.fitness.app"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.zenythium.fitness.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 9
        versionName "0.4.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        debug {
            // Используем debug подпись для тестирования
        }
        release {
            // Для тестирования используем debug подпись
            // В продакшене нужно создать отдельный release ключ
            if (releaseKeystoreFile != null && releaseKeystoreFile.exists()) {
                storeFile releaseKeystoreFile
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    
    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (releaseKeystoreFile != null && releaseKeystoreFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
    
    // Quality gate: при lint severity=Error задача lint* падает; отчёты: build/reports/lint-results-release.{html,xml}.
    lint {
        checkReleaseBuilds true
        abortOnError true
        htmlReport true
        xmlReport true
    }
    
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def versionName = variant.versionName
            def versionCode = variant.versionCode
            def buildType = variant.buildType.name
            
            if (buildType == "debug") {
                outputFileName = "zenythium-debug-v${versionName}.apk"
            } else {
                outputFileName = "zenythium-v${versionName}.apk"
            }
        }
    }
}

// Release APK не считается успешной, пока не прошёл полный lintRelease (не только lintVital подмножество).
afterEvaluate {
    tasks.named('assembleRelease').configure {
        dependsOn('lintRelease')
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    
    // Firebase BoM для управления версиями
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    // Firebase Cloud Messaging для push-уведомлений
    implementation 'com.google.firebase:firebase-messaging'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
